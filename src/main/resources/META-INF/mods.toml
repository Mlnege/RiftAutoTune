modLoader = "javafml"
loaderVersion = "[47,)"
license = "MIT"
issueTrackerURL = "https://example.com/riftautotune/issues"

[[mods]]
    modId = "riftautotune"
    version = "${file.jarVersion}"
    displayName = "RiftAutoTune"
    authors = "Nightfall Chronicles"
    description = '''
RiftAutoTune benchmarks your hardware on first launch and auto-configures vanilla graphics,
Oculus shaders, and Distant Horizons to hold a target FPS band (default 60-100), keeping
visuals as high as the hardware allows. Client-side only.
'''

# ---------------------------------------------------------------------------
# Dependencies. Forge + Minecraft are mandatory; every mod we integrate with
# is OPTIONAL so RiftAutoTune loads cleanly even when they are absent.
# ---------------------------------------------------------------------------
[[dependencies.riftautotune]]
    modId = "forge"
    mandatory = true
    versionRange = "[47,)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.riftautotune]]
    modId = "minecraft"
    mandatory = true
    versionRange = "[1.20.1,1.21)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.riftautotune]]
    modId = "embeddium"
    mandatory = false
    versionRange = "*"
    ordering = "AFTER"
    side = "CLIENT"

[[dependencies.riftautotune]]
    modId = "oculus"
    mandatory = false
    versionRange = "*"
    ordering = "AFTER"
    side = "CLIENT"

[[dependencies.riftautotune]]
    modId = "distanthorizons"
    mandatory = false
    versionRange = "*"
    ordering = "AFTER"
    side = "CLIENT"
